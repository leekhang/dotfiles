set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'   # Save/restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto-save sessions every 15min
set -g @plugin 'tmux-plugins/tmux-pain-control' # Better pane navigation

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_host_text " mbp"
run '~/.tmux/plugins/tpm/tpm'

unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g mouse on

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g status-position top

set -g base-index 1

set -g status-left ""

set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}#{E:@catppuccin_status_host}"
